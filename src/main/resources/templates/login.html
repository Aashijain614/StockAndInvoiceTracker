<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Stock Tracker</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

        body {
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)),
                        url('https://images.unsplash.com/photo-1551288049-bebda4e38f71') no-repeat center/cover;
            color:white;
        }

        .container {
            width:380px;
            padding:30px;
            border-radius:20px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            box-shadow:0 10px 40px rgba(0,0,0,0.6);
        }

        h2 {
            text-align:center;
            margin-bottom:20px;
            background: linear-gradient(90deg,#00e0ff,#fff);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .input-group { margin-bottom:15px; }

        input {
            width:100%;
            padding:12px;
            border-radius:10px;
            border:none;
            outline:none;
            background: rgba(255,255,255,0.15);
            color:white;
        }

        input::placeholder { color:#ccc; }

        .btn {
            width:100%;
            padding:12px;
            border-radius:25px;
            border:none;
            background:#00e0ff;
            color:black;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
        }

        .btn:hover { background:white; }

        .signup-link {
            text-align:center;
            margin-top:15px;
            font-size:14px;
        }

        .signup-link a { color:#00e0ff; text-decoration:none; }

        .error { color:red; text-align:center; margin-bottom:10px; }
        .success { color:lightgreen; text-align:center; margin-bottom:10px; }

    </style>
</head>
<body>

<div class="container">
    <h2>Login</h2>

    <p class="success" th:if="${success}" th:text="${success}"></p>
    <p class="error" th:if="${error}" th:text="${error}"></p>

    <form th:action="@{/login}" method="post">

        <div class="input-group">
            <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="input-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button class="btn" type="submit">Login</button>

    </form>

    <div class="signup-link">
        Don't have an account? <a th:href="@{/register}">Sign Up</a>
    </div>
</div>

</body>
</html>
