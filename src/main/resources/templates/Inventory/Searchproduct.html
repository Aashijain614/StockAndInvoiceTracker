<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Search Product</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background:#0b1220; color:white; }

        .navbar {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 25px;
            background:#111827;
            border-bottom:1px solid #222;
        }
        .nav-btn {
            padding:8px 15px;
            border:none;
            border-radius:20px;
            cursor:pointer;
            margin-left:10px;
            font-family:'Poppins', sans-serif;
        }
        .home-btn { background:#00e0ff; color:#0b1220; font-weight:600; }
        .back-btn { background:#1f2937; color:white; }
        .logout-btn { background:#ff4d4d; color:white; }

        .container { padding:30px; }

        h2 { margin-bottom:25px; }

        .search-bar {
            display:flex;
            gap:10px;
            margin-bottom:30px;
        }
        .search-bar input {
            flex:1;
            padding:12px 18px;
            border-radius:10px;
            border:1px solid #374151;
            background:#1f2937;
            color:white;
            font-size:15px;
            font-family:'Poppins', sans-serif;
            outline:none;
        }
        .search-bar input:focus { border-color:#00e0ff; }
        .search-bar button {
            padding:12px 24px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-size:15px;
            font-family:'Poppins', sans-serif;
            cursor:pointer;
            transition:0.3s;
        }
        .search-bar button:hover { background:#1d4ed8; }

        .result-info {
            margin-bottom:15px;
            color:#9ca3af;
            font-size:14px;
        }
        .result-info span { color:#00e0ff; font-weight:600; }

        table {
            width:100%;
            border-collapse:collapse;
            background:#111827;
            border-radius:12px;
            overflow:hidden;
        }
        thead { background:#1f2937; }
        th { padding:14px 16px; text-align:left; color:#9ca3af; font-weight:500; font-size:13px; text-transform:uppercase; letter-spacing:0.5px; }
        td { padding:13px 16px; border-bottom:1px solid #1f2937; font-size:14px; }
        tbody tr:hover { background:#1a2436; }
        tbody tr:last-child td { border-bottom:none; }

        .badge {
            padding:4px 10px;
            border-radius:20px;
            font-size:12px;
            font-weight:600;
        }
        .badge-ok { background:#064e3b; color:#6ee7b7; }
        .badge-low { background:#78350f; color:#fcd34d; }
        .badge-out { background:#450a0a; color:#fca5a5; }

        .empty-state {
            text-align:center;
            padding:60px 20px;
            color:#6b7280;
        }
        .empty-state .icon { font-size:50px; margin-bottom:15px; }
        .empty-state p { font-size:16px; }
    </style>
</head>
<body>

<div class="navbar">
    <h2>🔍 Search Product</h2>
    <div>
        <button class="nav-btn back-btn" onclick="window.location.href='/manage-inventory'">← Back</button>
        <button class="nav-btn home-btn" onclick="window.location.href='/dashboard'">Home</button>
        <button class="nav-btn logout-btn" onclick="window.location.href='/logout'">Logout</button>
    </div>
</div>

<div class="container">

    <h2>Search Product</h2>

    <form action="/inventory/search" method="get" class="search-bar">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="Enter product name..." autocomplete="off" />
        <button type="submit">🔍 Search</button>
    </form>

    <div class="result-info" th:if="${keyword != null and !keyword.isBlank()}">
        Showing results for: <span th:text="'&quot;' + ${keyword} + '&quot;'"></span>
        &nbsp;—&nbsp; <span th:text="${products.size()}"></span> product(s) found
    </div>

    <div th:if="${products.isEmpty()}" class="empty-state">
        <div class="icon">🔍</div>
        <p>No products found<span th:if="${keyword != null and !keyword.isBlank()}"> for "<span th:text="${keyword}"></span>"</span>.</p>
    </div>

    <table th:if="${!products.isEmpty()}">
        <thead>
        <tr>
            <th>#</th>
            <th>Product Name</th>
            <th>Price (₹)</th>
            <th>Quantity</th>
            <th>Low Stock Threshold</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p, stat : ${products}">
            <td th:text="${stat.index + 1}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${'₹ ' + p.price}"></td>
            <td th:text="${p.quantity}"></td>
            <td th:text="${p.lowStockThreshold}"></td>
            <td>
                <span th:if="${p.quantity == 0}" class="badge badge-out">Out of Stock</span>
                <span th:if="${p.quantity > 0 and p.quantity <= p.lowStockThreshold}" class="badge badge-low">Low Stock</span>
                <span th:if="${p.quantity > p.lowStockThreshold}" class="badge badge-ok">In Stock</span>
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
