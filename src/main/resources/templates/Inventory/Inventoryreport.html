<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Inventory Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background:#0b1220; color:white; }

        .navbar {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 25px;
            background:#111827;
            border-bottom:1px solid #222;
        }
        .nav-btn {
            padding:8px 15px;
            border:none;
            border-radius:20px;
            cursor:pointer;
            margin-left:10px;
            font-family:'Poppins', sans-serif;
        }
        .home-btn { background:#00e0ff; color:#0b1220; font-weight:600; }
        .back-btn { background:#1f2937; color:white; }
        .logout-btn { background:#ff4d4d; color:white; }

        .container { padding:30px; }
        h2 { margin-bottom:25px; }

        /* SUMMARY CARDS */
        .summary-cards {
            display:grid;
            grid-template-columns:repeat(4, 1fr);
            gap:20px;
            margin-bottom:30px;
        }
        .summary-card {
            background:linear-gradient(135deg, #1f2937, #111827);
            border-radius:12px;
            padding:20px;
            text-align:center;
            border:1px solid #1f2937;
        }
        .summary-card .s-icon { font-size:28px; margin-bottom:8px; }
        .summary-card .s-label { color:#9ca3af; font-size:13px; margin-bottom:5px; }
        .summary-card .s-value { font-size:22px; font-weight:600; color:#00e0ff; }

        table {
            width:100%;
            border-collapse:collapse;
            background:#111827;
            border-radius:12px;
            overflow:hidden;
        }
        thead { background:#1f2937; }
        th { padding:14px 16px; text-align:left; color:#9ca3af; font-weight:500; font-size:13px; text-transform:uppercase; letter-spacing:0.5px; }
        td { padding:13px 16px; border-bottom:1px solid #1f2937; font-size:14px; }
        tbody tr:hover { background:#1a2436; }
        tbody tr:last-child td { border-bottom:none; }

        .badge {
            padding:4px 10px;
            border-radius:20px;
            font-size:12px;
            font-weight:600;
        }
        .badge-ok { background:#064e3b; color:#6ee7b7; }
        .badge-low { background:#78350f; color:#fcd34d; }
        .badge-out { background:#450a0a; color:#fca5a5; }

        .section-title {
            font-size:18px;
            font-weight:600;
            margin-bottom:15px;
            color:#e5e7eb;
        }

        .print-btn {
            padding:10px 20px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-size:14px;
            font-family:'Poppins', sans-serif;
            cursor:pointer;
            margin-bottom:20px;
            transition:0.3s;
        }
        .print-btn:hover { background:#1d4ed8; }

        @media (max-width: 900px) {
            .summary-cards { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="navbar">
    <h2>📊 Inventory Report</h2>
    <div>
        <button class="nav-btn back-btn" onclick="window.location.href='/manage-inventory'">← Back</button>
        <button class="nav-btn home-btn" onclick="window.location.href='/dashboard'">Home</button>
        <button class="nav-btn logout-btn" onclick="window.location.href='/logout'">Logout</button>
    </div>
</div>

<div class="container">

    <h2>Inventory Report</h2>

    <button class="print-btn" onclick="window.print()">🖨️ Print Report</button>

    <!-- SUMMARY -->
    <div class="summary-cards">
        <div class="summary-card">
            <div class="s-icon">📦</div>
            <div class="s-label">Total Products</div>
            <div class="s-value" th:text="${totalProducts}">0</div>
        </div>
        <div class="summary-card">
            <div class="s-icon">❌</div>
            <div class="s-label">Out of Stock</div>
            <div class="s-value" style="color:#fca5a5;" th:text="${outOfStock}">0</div>
        </div>
        <div class="summary-card">
            <div class="s-icon">⚠️</div>
            <div class="s-label">Low Stock</div>
            <div class="s-value" style="color:#fcd34d;" th:text="${lowStock}">0</div>
        </div>
        <div class="summary-card">
            <div class="s-icon">💰</div>
            <div class="s-label">Total Stock Value (₹)</div>
            <div class="s-value" style="color:#6ee7b7;" th:text="${totalValue}">0.00</div>
        </div>
    </div>

    <div class="section-title">All Products</div>

    <table>
        <thead>
        <tr>
            <th>#</th>
            <th>Product Name</th>
            <th>Price (₹)</th>
            <th>Quantity</th>
            <th>Low Stock Threshold</th>
            <th>Stock Value (₹)</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p, stat : ${products}">
            <td th:text="${stat.index + 1}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.price}"></td>
            <td th:text="${p.quantity}"></td>
            <td th:text="${p.lowStockThreshold}"></td>
            <td th:text="${#numbers.formatDecimal(p.price * p.quantity, 1, 2)}"></td>
            <td>
                <span th:if="${p.quantity == 0}" class="badge badge-out">Out of Stock</span>
                <span th:if="${p.quantity > 0 and p.quantity <= p.lowStockThreshold}" class="badge badge-low">Low Stock</span>
                <span th:if="${p.quantity > p.lowStockThreshold}" class="badge badge-ok">In Stock</span>
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
