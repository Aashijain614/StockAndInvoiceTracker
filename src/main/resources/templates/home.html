<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock & Invoice Tracker</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)),
                        url('https://images.unsplash.com/photo-1554224155-8d04cb21cd6c') no-repeat center/cover;
            color: white;
            overflow: hidden;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 50px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 26px;
            font-weight: 600;
            color: #00e0ff;
            letter-spacing: 1px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-size: 15px;
            transition: 0.3s ease;
        }

        .nav-links a:hover {
            color: #00e0ff;
        }

        /* Buttons in navbar */
        .nav-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid #00e0ff;
            color: white;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background: #00e0ff;
            color: black;
        }

        .signup-btn {
            background: #00e0ff;
            color: black;
        }

        .signup-btn:hover {
            background: white;
        }

        /* Hero Section */
        .hero {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 80px);
            padding: 0 20px;
        }

        .hero-content {
            text-align: center;
            max-width: 700px;
            animation: fadeIn 1.2s ease-in-out;
        }

        .hero h1 {
            font-size: 52px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #00e0ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #ddd;
        }

        /* Feature badges */
        .features {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 10px 18px;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 14px;
            backdrop-filter: blur(8px);
            transition: 0.3s;
        }

        .badge:hover {
            background: rgba(0,224,255,0.2);
            transform: translateY(-3px);
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">StockTracker</div>
        <ul class="nav-links">
            <li><a th:href="@{/}">Home</a></li>
            <li><a class="nav-btn" th:href="@{/login}">Login</a></li>
            <li><a class="nav-btn signup-btn" th:href="@{/register}">Sign Up</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Smart Stock & Invoice Management</h1>
            <p>Track inventory, manage invoices, and grow your business with a modern and powerful dashboard.</p>

            <div class="features">
                <div class="badge">📦 Inventory Tracking</div>
                <div class="badge">🧾 Invoice Management</div>
                <div class="badge">📊 Reports & Analytics</div>
                <div class="badge">⚡ Fast & Secure</div>
            </div>
        </div>
    </section>

</body>
</html>
