<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        body { display:flex; background:#0b1220; color:white; font-family:Poppins; }
        .sidebar { width:220px; background:#111827; padding:20px; }
        .menu a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.menu a i {
    font-size: 16px;
}

.menu a:hover {
    background: #1f2937;
    transform: translateX(5px);
}
canvas {
    max-height: 200px !important;
}
.chart-wrapper {
    width: 100%;
    height: 150px;   /* 👈 yaha se size control hoga */
    position: relative;
}

#salesChart {
    max-height: 100% !important;
}
        .main { flex:1; }
        .navbar { display:flex; justify-content:space-between; padding:15px; background:#111827; }

        .content { padding:20px; }

        .cards {
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:15px;
        }

        .card {
            background:#1f2937;
            padding:15px;
            border-radius:10px;
        }

        .grid {
            display:grid;
            grid-template-columns:2fr 1fr;
            gap:20px;
            margin-top:20px;
        }

        table { width:100%; margin-top:10px; }
        td,th { padding:8px; border-bottom:1px solid #333; }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>ADMIN</h2>
    <div class="menu">
        <a href="/dashboard">
        <i class="fas fa-home"></i> Dashboard
    </a>

    <a th:href="@{/invoice-page}">
        <i class="fas fa-file-invoice"></i> Generate Invoice
    </a>

    <a th:href="@{/manage-users}">
        <i class="fas fa-users"></i> Users
    </a>

    <a th:href="@{/invoice-history}">
        <i class="fas fa-clock-rotate-left"></i> History
    </a>

    <a th:href="@{/manage-inventory}">
        <i class="fas fa-boxes-stacked"></i> Inventory
    </a>
    </div>
</div>

<div class="main">

    <div class="navbar">
        <h3>Dashboard</h3>
        <div>
            <button onclick="location.href='/'">Home</button>
            <button onclick="location.href='/logout'">Logout</button>
        </div>
    </div>

    <div class="content">

        <h2>Welcome <span th:text="${userName}"></span> 👋</h2>

        <!-- STATS -->
        <div class="cards">

    <div class="card">
        <h4>Total Sales</h4>
        <p>💰 ₹ <span th:text="${totalSales}"></span></p>
    </div>

    <div class="card">
        <h4>Total Invoices</h4>
        <p>🧾 <span th:text="${totalInvoices}"></span></p>
    </div>

    <div class="card">
        <h4>Total Products</h4>
        <p>📦 <span th:text="${totalProducts}"></span></p>
    </div>

    <div class="card">
        <h4>Low Stock Items</h4>
        <p>⚠ <span th:text="${lowStock}"></span></p>
    </div>

</div>

        <!-- CHART -->
        <div class="grid">
    
    <div class="card">
        <h3>Monthly Sales</h3>

        <!-- 🔥 WRAPPER ADD KRO -->
        <div class="chart-wrapper">
            <canvas id="salesChart"></canvas>
        </div>

    </div>

    <div class="card">
        <h3>Low Stock</h3>
        <p th:each="p : ${lowStockProducts}"
           th:text="${p.name + ' (' + p.quantity + ')'}"></p>
    </div>

</div>

        <!-- TABLE -->
        <div class="card">
            <h3>Recent Invoices</h3>

            <table>
                <tr>
                    <th>ID</th>
                    <th>Customer</th>
                    <th>Amount</th>
                </tr>

                <tr th:each="inv : ${recentInvoices}">
                    <td th:text="${inv.invoiceNumber}"></td>
                    <td th:text="${inv.customerName}"></td>
                    <td th:text="${inv.totalAmount}"></td>
                </tr>
            </table>
        </div>

    </div>
</div>

<script th:inline="javascript">

    document.addEventListener("DOMContentLoaded", function () {

        // --- 1. COUNTER ANIMATION LOGIC ---
        const counters = document.querySelectorAll('.counter-value');
        const animationSpeed = 100; // Isse speed control hogi (kam matlab fast)

        counters.forEach(counter => {
            const updateCount = () => {
                // Thymeleaf se aayi target value (+) se number mein convert ho rahi hai
                const target = +counter.getAttribute('data-target');
                const count = +counter.innerText;

                // Har step par kitna badhega
                const increment = target / animationSpeed;

                if (count < target) {
                    // Number badhao aur 10ms baad phir chalao
                    counter.innerText = Math.ceil(count + increment);
                    setTimeout(updateCount, 15);
                } else {
                    // Agar target se upar chala jaye toh final value set kar do
                    counter.innerText = target.toLocaleString('en-IN'); // ₹ format ke liye
                }
            };

            updateCount();
        });


        // --- 2. SALES CHART LOGIC ---
        const months = /*[[${months}]]*/ [];
        const sales = /*[[${sales}]]*/ [];

        // Agar data nahi hai toh chart mat banao
        if(months && months.length > 0) {
            const ctx = document.getElementById('salesChart').getContext('2d');

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: months,
                    datasets: [{
                        label: 'Monthly Sales',
                        data: sales,
                        backgroundColor: 'rgba(37, 99, 235, 0.8)',
                        borderColor: '#2563eb',
                        borderWidth: 1,
                        borderRadius: 5,
                        barThickness: 20
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { color: '#9ca3af', font: { size: 11 } }
                        },
                        y: {
                            beginAtZero: true,
                            grid: { color: '#374151' },
                            ticks: {
                                color: '#9ca3af',
                                font: { size: 10 },
                                callback: function(value) {
                                    return value >= 1000 ? (value/1000) + 'k' : value;
                                }
                            }
                        }
                    }
                }
            });
        }

    });
</script>
