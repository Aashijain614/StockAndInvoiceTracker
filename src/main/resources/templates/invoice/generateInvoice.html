<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Generate Invoice</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #0b1220;
            color: white;
            margin: 0;
        }

        .container {
            width: 90%;
            margin: auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            background: linear-gradient(90deg,#2563eb,#1e40af);
            padding: 15px 20px;
            border-radius: 10px;
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        .logout { background: red; color: white; }

        .grid {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            flex: 1;
            background: #111827;
            padding: 20px;
            border-radius: 15px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 8px;
            border: none;
            background: #1f2937;
            color: white;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .add-btn {
            background: green;
            margin-top: 10px;
        }

        .generate {
            background: #2563eb;
            margin-top: 20px;
        }

        table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
        }

        td, th {
            padding: 10px;
            border-bottom: 1px solid #333;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h2>Invoice & Billing System</h2>
        <button class="btn logout" onclick="window.location.href='/login'">Logout</button>
    </div>

    <div class="grid">

        <!-- LEFT: FORM -->
        <div class="card">

            <h3>Create Invoice</h3>

            <form th:action="@{/invoice}" method="post">

                <label>Customer Name</label>
                <input type="text" name="customerName" required>

                <label>Invoice Number</label>
                <input type="text" name="invoiceNumber" th:value = ${invoiceNumber} readonly>

                <label>Date</label>
                <input type="date" name="date" th:value="${todayDate}" readonly>

                <!-- 🔥 PRODUCT SECTION -->
                <h4 style="margin-top:20px;">Add Items</h4>

                <div class="row">
                    <!-- PRODUCT DROPDOWN -->
                    <select id="productSelect">
                        <option value="">Select Product</option>

                        <!-- 🔥 backend se products -->
                        <option th:each="p : ${products}"
                                th:value="${p.id}"
                                th:data-price="${p.price}"
                                th:text="${p.name}"
                                th:data-stock="${p.quantity}"
                                >
                        </option>
                    </select>

                    <input type="number" id="qty" placeholder="Qty">
                    <input type="text" id="price" placeholder="Price" readonly>
                </div>

                <button type="button" class="btn add-btn" onclick="addItem()">+ Add Item</button>

                <!-- TABLE -->
                <table id="itemTable">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Qty</th>
                            <th>Price</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>

                <h3>Total: ₹ <span id="grandTotal">0</span></h3>

                <button type = "submit" class="btn generate">Generate Invoice</button>

            </form>

        </div>

        <!-- RIGHT: PREVIEW -->
        <div class="card">
            <h3>Preview</h3>
            <p>Live preview can be added later</p>
        </div>

    </div>

</div>
<script>
let grandTotal = 0;

document.addEventListener("DOMContentLoaded", function () {

    const productSelect = document.getElementById("productSelect");
    const priceInput = document.getElementById("price");
    const qtyInput = document.getElementById("qty");

    // 🔥 AUTO PRICE + STOCK SET
    productSelect.addEventListener("change", function () {

        let selectedOption = this.options[this.selectedIndex];

        let price = selectedOption.getAttribute("data-price");
        let stock = selectedOption.getAttribute("data-stock");

        // set price
        priceInput.value = price || "";

        // set max quantity
        qtyInput.max = stock;

        // show hint
        qtyInput.placeholder = "Max: " + stock;
    });

});


// 🔥 ADD ITEM FUNCTION
function addItem() {

    const select = document.getElementById("productSelect");
    const qtyInput = document.getElementById("qty");
    const priceInput = document.getElementById("price");

    let productId = select.value;
    let productName = select.options[select.selectedIndex].text;

    let price = parseFloat(priceInput.value);
    let qty = parseInt(qtyInput.value);
    let maxStock = parseInt(qtyInput.max);

    // ❌ validation 1
    if (!productId) {
        alert("Please select a product");
        return;
    }

    // ❌ validation 2
    if (!qty || qty <= 0) {
        alert("Enter valid quantity");
        return;
    }

    // ❌ validation 3 (🔥 MOST IMPORTANT)
    if (qty > maxStock) {
        alert("Only " + maxStock + " items available in stock!");
        return;
    }

    // 🔥 calculate
    let itemTotal = price * qty;
    grandTotal += itemTotal;

    document.getElementById("grandTotal").innerText = grandTotal.toFixed(2);

    // 🔥 add row
    let row = `
        <tr>
            <td>${productName}</td>
            <td>${qty}</td>
            <td>${price}</td>
            <td>${itemTotal.toFixed(2)}</td>
        </tr>
    `;

    document.querySelector("#itemTable tbody").innerHTML += row;

    // 🔥 hidden inputs (IMPORTANT)
    const form = document.querySelector("form");

    let input1 = document.createElement("input");
    input1.type = "hidden";
    input1.name = "productIds";
    input1.value = productId;

    let input2 = document.createElement("input");
    input2.type = "hidden";
    input2.name = "quantities";
    input2.value = qty;

    form.appendChild(input1);
    form.appendChild(input2);

    // 🔥 reset
    qtyInput.value = "";
    priceInput.value = "";
    select.selectedIndex = 0;
}
</script>
</body>
</html>
