<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Stock Tracker</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)),
                        url('https://images.unsplash.com/photo-1551288049-bebda4e38f71') no-repeat center/cover;
            color: white;
        }

        .container {
            width: 420px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            animation: fadeIn 1s ease;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
            background: linear-gradient(90deg, #00e0ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .input-group {
            margin-bottom: 15px;
            width: 100%;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.15);
            color: white;
        }

        input::placeholder {
            color: #ccc;
        }

        select {
            color: white;
        }

        option {
            color: black;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            background: #00e0ff;
            color: black;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            transform: translateY(-2px);
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .login-link a {
            color: #00e0ff;
            text-decoration: none;
        }

        .badge-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px);} 
            to { opacity: 1; transform: translateY(0);} 
        }

    </style>
</head>
<body>

<div class="container">

    <h2>Create Account</h2>

    <div class="badge-bar">
        <div class="badge">📦 Inventory</div>
        <div class="badge">🧾 Billing</div>
        <div class="badge">📊 Analytics</div>
    </div>

    <form th:action="@{/signup}" th:object="${user}" method="post">

        <div class="row">
            <div class="input-group">
                <input type="text" th:field="*{firstname}" placeholder="First Name" required>
            </div>

            <div class="input-group">
                <input type="text" th:field="*{lastname}" placeholder="Last Name" required>
            </div>
        </div>

        <div class="input-group">
            <input type="email" th:field="*{email}" placeholder="Email Address" required>
        </div>

        <div class="input-group">
            <input type="password" th:field="*{password}" placeholder="Password" required>
        </div>

        <div class="input-group">
            <select th:field="*{gender}">
                <option value="">Select Gender</option>
                <option value="MALE">Male</option>
                <option value="FEMALE">Female</option>
            </select>
        </div>

        <div class="input-group">
            <select th:field="*{role}">
                <option value="">Select Role</option>
                <option value="ADMIN">Admin</option>
                <option value="CASHIER">Cashier</option>
            </select>
        </div>

        <button class="btn" type="submit">Create Account</button>

    </form>

    <div class="login-link">
        Already have an account? <a th:href="@{/login}">Login</a>
    </div>

</div>

</body>
</html>
